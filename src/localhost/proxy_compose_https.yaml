# Applied only after `localhost trust` has installed this proxy's public root.
services:
  bootstrap:
    image: golang:1.24.6-alpine
    working_dir: /src
    entrypoint: [go, run, ./cmd/bootstrap]
    command:
      - --root-path=/var/lib/localhost-root
      - --signer-path=/var/lib/localhost-ca
    network_mode: none
    restart: "no"
    volumes:
      - ./traefik_plugin/src/github.com/SmileyChris/traefik-localhost-ca:/src:ro
      - localhost-ca-root:/var/lib/localhost-root
      - localhost-ca-signer:/var/lib/localhost-ca

  traefik:
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --global.checknewversion=false
      - --global.sendanonymoususage=false
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=localhost-proxy
      - --providers.plugin.localhostCA.dockerendpoint=unix:///var/run/docker.sock
      - --providers.plugin.localhostCA.network=localhost-proxy
      - --providers.plugin.localhostCA.storagepath=/var/lib/localhost-ca
      - --providers.plugin.localhostCA.pollinterval=250ms
      - --providers.plugin.localhostCA.domainsuffix=localhost
      - --providers.plugin.localhostCA.leaflifetime=24h
      - --providers.plugin.localhostCA.renewbefore=6h
      - --experimental.abortonpluginfailure=true
      - --experimental.localplugins.localhostCA.modulename=github.com/SmileyChris/traefik-localhost-ca
    ports:
      - 127.0.0.1:${LOCALHOST_HTTPS_PORT:-443}:443
    volumes:
      - localhost-ca-signer:/var/lib/localhost-ca
    labels:
      - traefik.http.routers.localhost-dashboard-secure.entrypoints=websecure
      - traefik.http.routers.localhost-dashboard-secure.rule=Host(`traefik.localhost`)
      - traefik.http.routers.localhost-dashboard-secure.service=api@internal
      - traefik.http.routers.localhost-dashboard-secure.tls=true

volumes:
  localhost-ca-root:
  localhost-ca-signer:

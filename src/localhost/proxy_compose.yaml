name: localhost

services:
  traefik:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost-traefik:v3.7.7
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --entrypoints.web.address=:80
      - --global.checknewversion=false
      - --global.sendanonymoususage=false
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=localhost-proxy
    healthcheck:
      test: [CMD, traefik, healthcheck, --ping]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    ports:
      - 127.0.0.1:${LOCALHOST_HTTP_PORT:-80}:80
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - localhost-proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=localhost-proxy
      - traefik.http.routers.localhost-dashboard.entrypoints=web
      - traefik.http.routers.localhost-dashboard.middlewares=localhost-dashboard-redirect
      - traefik.http.routers.localhost-dashboard.rule=Host(`traefik.localhost`)
      - traefik.http.routers.localhost-dashboard.service=api@internal
      - traefik.http.middlewares.localhost-dashboard-redirect.redirectregex.permanent=true
      - traefik.http.middlewares.localhost-dashboard-redirect.redirectregex.regex=^http://([^/]+)/?$
      - traefik.http.middlewares.localhost-dashboard-redirect.redirectregex.replacement=http://$${1}/dashboard/

networks:
  localhost-proxy:
    name: localhost-proxy

name: localghost

services:
  traefik:
    build:
      context: .
      dockerfile: Dockerfile
    image: localghost-traefik:${LOCALGHOST_IMAGE_TAG}
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --entrypoints.web.address=:80
      - --global.checknewversion=false
      - --global.sendanonymoususage=false
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=localghost
    healthcheck:
      test: [CMD, traefik, healthcheck, --ping]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    ports:
      - 127.0.0.1:${LOCALGHOST_HTTP_PORT:-80}:80
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - localghost
    labels:
      - traefik.enable=true
      - traefik.docker.network=localghost
      - traefik.http.routers.localghost-dashboard.entrypoints=web
      - traefik.http.routers.localghost-dashboard.middlewares=localghost-dashboard-redirect
      - traefik.http.routers.localghost-dashboard.rule=Host(`traefik.localhost`)
      - traefik.http.routers.localghost-dashboard.service=api@internal
      - traefik.http.middlewares.localghost-dashboard-redirect.redirectregex.permanent=true
      - traefik.http.middlewares.localghost-dashboard-redirect.redirectregex.regex=^http://([^/]+)/?$
      - traefik.http.middlewares.localghost-dashboard-redirect.redirectregex.replacement=http://$${1}/dashboard/

networks:
  localghost:
    name: localghost

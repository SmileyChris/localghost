displayName: Localghost CA Provider
type: provider
import: github.com/SmileyChris/traefik-localghost-ca
summary: Local CA certificate provider for .localhost development

testData:
  dockerEndpoint: unix:///var/run/docker.sock
  network: localghost-https-poc
  storagePath: /var/lib/localghost-ca
  pollInterval: 500ms
  domainSuffix: localhost
  leafLifetime: 24h

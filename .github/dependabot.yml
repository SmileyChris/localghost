version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    allow:
      - dependency-name: traefik
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions

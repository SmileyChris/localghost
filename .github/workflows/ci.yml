name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.15"
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests with coverage
        run: >-
          uv run --python ${{ matrix.python-version }} --frozen pytest
          --ignore=tests/test_compose_contract.py
          --cov=localghost
          --cov-branch
          --cov-report=term-missing

  integration:
    needs: unit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      COMPOSE_VERSION: v5.1.4
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.15"

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: src/localghost/traefik_plugin/src/github.com/SmileyChris/traefik-localghost-ca/go.mod
          cache-dependency-path: src/localghost/traefik_plugin/src/github.com/SmileyChris/traefik-localghost-ca/go.sum

      - name: Install supported Docker Compose
        run: |
          mkdir -p "${HOME}/.docker/cli-plugins"
          curl --fail --silent --show-error --location \
            "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
            --output "${HOME}/.docker/cli-plugins/docker-compose"
          chmod +x "${HOME}/.docker/cli-plugins/docker-compose"
          docker compose version

      - name: Validate shell scripts
        run: |
          bash -n scripts/integration-test.sh
          bash -n tests/generator-test.sh
          shellcheck scripts/integration-test.sh tests/generator-test.sh

      - name: Check code and Compose contracts
        run: |
          uv run --frozen ruff check .
          uv run --frozen pytest tests/test_compose_contract.py
          ./tests/generator-test.sh

      - name: Test local Traefik provider
        working-directory: src/localghost/traefik_plugin/src/github.com/SmileyChris/traefik-localghost-ca
        run: go test ./...

      - name: Build Python package
        run: uv build --no-sources

      - name: Install and exercise the built wheel
        run: |
          wheel=$(find dist -maxdepth 1 -name '*.whl' -print -quit)
          test -n "${wheel}"
          uvx --isolated --from "${wheel}" localghost --help
          uvx --isolated --from "${wheel}" localghost
          uvx --isolated --from "${wheel}" localghost down

      - name: Run integration suite
        run: ./scripts/integration-test.sh
